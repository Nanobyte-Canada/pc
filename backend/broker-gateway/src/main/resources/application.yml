spring:
  application:
    name: broker-gateway-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${DATABASE_USERNAME:portfolio}
    password: ${DATABASE_PASSWORD:portfolio}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: broker_gateway
  flyway:
    enabled: true
    schemas: broker_gateway
    default-schema: broker_gateway
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mvc:
    problemdetails:
      enabled: true

server:
  port: ${PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized

broker-gateway:
  encryption:
    secret-key: ${BROKER_ENCRYPTION_KEY:}
  service-auth:
    api-key: ${GATEWAY_API_KEY:dev-gateway-key}
  ibkr:
    enabled: ${IBKR_GATEWAY_ENABLED:false}
    host: ${IBKR_HOST:}
    port: ${IBKR_PORT:4002}
    client-id: ${IBKR_GATEWAY_CLIENT_ID:2}
    connect-timeout-ms: ${IBKR_CONNECT_TIMEOUT:5000}
    request-timeout-ms: ${IBKR_REQUEST_TIMEOUT:30000}
    flex-token: ${IBKR_FLEX_TOKEN:}
    flex-query-id: ${IBKR_FLEX_QUERY_ID:}
