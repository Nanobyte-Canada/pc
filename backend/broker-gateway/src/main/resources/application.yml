spring:
  application:
    name: broker-gateway-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${DATABASE_USERNAME:portfolio}
    password: ${DATABASE_PASSWORD:portfolio}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: broker_gateway
  flyway:
    enabled: true
    schemas: broker_gateway
    default-schema: broker_gateway
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mvc:
    problemdetails:
      enabled: true

server:
  port: ${PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized

broker-gateway:
  encryption:
    secret-key: ${BROKER_ENCRYPTION_KEY:}
  service-auth:
    api-key: ${GATEWAY_API_KEY:dev-gateway-key}
  ibkr:
    enabled: ${IBKR_GATEWAY_ENABLED:false}
    host: ${IBKR_HOST:}
    port: ${IBKR_PORT:4002}
    client-id: ${IBKR_GATEWAY_CLIENT_ID:2}
    connect-timeout-ms: ${IBKR_CONNECT_TIMEOUT:5000}
    request-timeout-ms: ${IBKR_REQUEST_TIMEOUT:30000}
    flex-token: ${IBKR_FLEX_TOKEN:}
    flex-query-id: ${IBKR_FLEX_QUERY_ID:}
  questrade:
    enabled: ${QUESTRADE_ENABLED:false}
    auth-url: ${QUESTRADE_AUTH_URL:https://login.questrade.com/oauth2/token}
    practice-auth-url: ${QUESTRADE_PRACTICE_AUTH_URL:https://practicelogin.questrade.com/oauth2/token}
    use-practice: ${QUESTRADE_USE_PRACTICE:false}
    rate-limit-per-second: ${QUESTRADE_RATE_LIMIT:1}
  wealthsimple:
    enabled: ${WEALTHSIMPLE_ENABLED:false}
    auth-url: ${WEALTHSIMPLE_AUTH_URL:https://api.production.wealthsimple.com/v1/oauth/v2/token}
    graphql-url: ${WEALTHSIMPLE_GRAPHQL_URL:https://my.wealthsimple.com/graphql}
    client-id: ${WEALTHSIMPLE_CLIENT_ID:4da53ac2b03225bed1550eba8e4611e086c7b905a3855571f1c77e1bbdc5f62b}
    order-rate-limit-per-hour: ${WS_ORDER_RATE_LIMIT:7}
