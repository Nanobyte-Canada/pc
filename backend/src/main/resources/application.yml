spring:
  application:
    name: portfolio-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${DATABASE_USERNAME:portfolio}
    password: ${DATABASE_PASSWORD:portfolio}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

app:
  version: ${APP_VERSION:0.0.1-SNAPSHOT}
  environment: ${APP_ENVIRONMENT:local}

# Authentication configuration
auth:
  jwt:
    signing-key: ${JWT_SIGNING_KEY:dev-signing-key-must-be-at-least-64-chars-for-hs512-algorithm-local}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:60m}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:6h}
    issuer: portfolio-app
  password:
    min-length: 12
    max-failed-attempts: 5
    lockout-duration: 30m
  email:
    provider: ${EMAIL_PROVIDER:console}
    from: ${EMAIL_FROM:noreply@portfolio.local}
    verification-expiry: 24h
    reset-expiry: 6h
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Ingestion configuration
ingestion:
  enabled: ${INGESTION_ENABLED:true}
  schedule: ${INGESTION_SCHEDULE:0 0 22 * * *}  # 10 PM daily

  exchanges:
    north-america:
      - US      # NYSE, NASDAQ
      - TO      # Toronto Stock Exchange
      - V       # TSX Venture
      - MX      # Mexican Stock Exchange

  eodhd:
    base-url: https://eodhd.com/api
    api-key: ${EODHD_API_KEY:696998d31abc34.90450552}
    rate-limit-per-second: 5

  alphavantage:
    enabled: ${AV_ENRICHMENT_ENABLED:true}
    api-key: ${ALPHA_VANTAGE_API_KEY:LC9XQHKOR17K6YHR}
    base-url: ${AV_BASE_URL:https://www.alphavantage.co/query}
    rate-limit:
      requests-per-minute: ${AV_RATE_LIMIT_RPM:75}
      burst-capacity: ${AV_RATE_LIMIT_BURST:75}
    retry:
      max-attempts: ${AV_RETRY_MAX_ATTEMPTS:3}
      initial-backoff-ms: ${AV_RETRY_INITIAL_BACKOFF:60000}
      max-backoff-ms: ${AV_RETRY_MAX_BACKOFF:300000}
      multiplier: ${AV_RETRY_MULTIPLIER:2.0}
      jitter-factor: ${AV_RETRY_JITTER:0.1}
    batch-size: ${AV_BATCH_SIZE:75}
    stale-threshold-days: ${AV_STALE_THRESHOLD:30}
    daily-quota: ${AV_DAILY_QUOTA:-1}

  etfcom:
    enabled: ${ETFCOM_ENABLED:true}
    base-url: ${ETFCOM_BASE_URL:https://api-prod.etf.com/v2/fund}
    batch-size: ${ETFCOM_BATCH_SIZE:20}
    stale-threshold-days: ${ETFCOM_STALE_THRESHOLD:7}
    concurrency: ${ETFCOM_CONCURRENCY:5}
    request-delay-ms: ${ETFCOM_REQUEST_DELAY_MS:500}
    inter-batch-delay-ms: ${ETFCOM_INTER_BATCH_DELAY_MS:5000}
    retry:
      max-attempts: ${ETFCOM_RETRY_MAX_ATTEMPTS:3}
      initial-backoff-ms: ${ETFCOM_RETRY_INITIAL_BACKOFF:1000}
      max-backoff-ms: ${ETFCOM_RETRY_MAX_BACKOFF:30000}
      multiplier: ${ETFCOM_RETRY_MULTIPLIER:2.0}
      jitter-factor: ${ETFCOM_RETRY_JITTER:0.1}

# Broker configuration
broker:
  encryption:
    secret-key: ${BROKER_ENCRYPTION_KEY:}  # Base64-encoded 32-byte key for AES-256
  sync:
    enabled: ${BROKER_SYNC_ENABLED:false}
    cron: ${BROKER_SYNC_CRON:0 30 22 * * *}

# SnapTrade integration configuration
snaptrade:
  client-id: ${SNAPTRADE_CLIENT_ID:}
  consumer-key: ${SNAPTRADE_CONSUMER_KEY:}
  redirect-uri: ${SNAPTRADE_REDIRECT_URI:http://localhost:3000/brokers/connections}
  health-check:
    enabled: ${SNAPTRADE_HEALTH_CHECK_ENABLED:false}
    cron: ${SNAPTRADE_HEALTH_CHECK_CRON:0 */15 * * * *}
