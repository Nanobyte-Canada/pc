spring:
  application:
    name: ingestion-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${DATABASE_USERNAME:portfolio}
    password: ${DATABASE_PASSWORD:portfolio}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ingestion
  flyway:
    enabled: true
    schemas: ingestion
    default-schema: ingestion
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mvc:
    problemdetails:
      enabled: true

server:
  port: ${PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized

ingestion:
  enabled: ${INGESTION_ENABLED:true}
  schedule: ${INGESTION_SCHEDULE:0 0 22 * * *}
  stale-threshold-days: ${INGESTION_STALE_DAYS:7}
  target-exchanges:
    - US
    - TO
    - V
    - INDX
    - GBOND
  eodhd:
    base-url: https://eodhd.com/api
    api-key: ${EODHD_API_KEY:696998d31abc34.90450552}
    rate-limit-per-second: 4
    daily-quota: 100000
    fundamentals-cost: 10
    batch-size: 50
