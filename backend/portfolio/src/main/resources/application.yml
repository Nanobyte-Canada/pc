spring:
  application:
    name: portfolio-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${DATABASE_USERNAME:portfolio}
    password: ${DATABASE_PASSWORD:portfolio}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 30000
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mvc:
    problemdetails:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

server:
  port: ${PORT:8080}

app:
  version: ${APP_VERSION:0.0.1-SNAPSHOT}
  environment: ${APP_ENVIRONMENT:local}

# Authentication configuration
auth:
  jwt:
    signing-key: ${JWT_SIGNING_KEY:dev-signing-key-must-be-at-least-64-chars-for-hs512-algorithm-local}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:60m}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:6h}
    issuer: portfolio-app
  password:
    min-length: 12
    max-failed-attempts: 5
    lockout-duration: 30m
  email:
    provider: ${EMAIL_PROVIDER:console}
    from: ${EMAIL_FROM:noreply@portfolio.local}
    verification-expiry: 24h
    reset-expiry: 6h
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized

# Broker gateway configuration
broker-gateway:
  url: ${BROKER_GATEWAY_URL:http://localhost:8084}
  api-key: ${GATEWAY_API_KEY:dev-gateway-key}
  timeout-ms: ${BROKER_GATEWAY_TIMEOUT:30000}

# Broker configuration
broker:
  encryption:
    secret-key: ${BROKER_ENCRYPTION_KEY:}  # Base64-encoded 32-byte key for AES-256
  sync:
    enabled: ${BROKER_SYNC_ENABLED:false}
    cron: ${BROKER_SYNC_CRON:0 30 22 * * *}
    max-lookback-years: ${BROKER_SYNC_MAX_LOOKBACK_YEARS:25}

# SnapTrade integration configuration
snaptrade:
  client-id: ${SNAPTRADE_CLIENT_ID:}
  consumer-key: ${SNAPTRADE_CONSUMER_KEY:}
  redirect-uri: ${SNAPTRADE_REDIRECT_URI:http://localhost:3000/brokers/connections}
  health-check:
    enabled: ${SNAPTRADE_HEALTH_CHECK_ENABLED:false}
    cron: ${SNAPTRADE_HEALTH_CHECK_CRON:0 */15 * * * *}
