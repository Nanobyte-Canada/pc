version: '3.8'

# VPS Production-like Docker Compose
# Used for deploying to Hostinger VPS (devpc.nanobyte.ca)

services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-portfolio}
      DATABASE_USERNAME: ${POSTGRES_USER:-portfolio}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_VERSION: ${APP_VERSION:-0.0.1-SNAPSHOT}
      APP_ENVIRONMENT: dev
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      CORS_ALLOWED_ORIGINS: https://devpc.nanobyte.ca
      EODHD_API_KEY: ${EODHD_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      BROKER_ENCRYPTION_KEY: ${BROKER_ENCRYPTION_KEY:-}
      QUESTRADE_CLIENT_ID: ${QUESTRADE_CLIENT_ID:-}
      QUESTRADE_CLIENT_SECRET: ${QUESTRADE_CLIENT_SECRET:-}
      QUESTRADE_REDIRECT_URI: https://devpc.nanobyte.ca/api/v1/brokers/QUESTRADE/callback
      IBKR_REDIRECT_URI: https://devpc.nanobyte.ca/api/v1/brokers/IBKR/callback
      SNAPTRADE_REDIRECT_URI: https://devpc.nanobyte.ca/api/v1/brokers/WEALTHSIMPLE/callback
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - portfolio-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: https://devpc.nanobyte.ca/api
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - portfolio-network

volumes:
  postgres_data:

networks:
  portfolio-network:
    driver: bridge
