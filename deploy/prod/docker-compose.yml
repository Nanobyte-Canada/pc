services:
  postgres:
    image: postgres:16-alpine
    container_name: prod-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - prod-network

  redis:
    image: redis:7-alpine
    container_name: prod-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - prod-network

  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:10.30.1t
    container_name: prod-ib-gateway
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: live
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "no"
      VNC_SERVER_PASSWORD: ${IBKR_VNC_PASSWORD:-}
      TWS_PORT: "4001"
    ports:
      - "127.0.0.1:15900:5900"
      - "127.0.0.1:14001:4001"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4001'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - prod-network

  backend:
    image: ghcr.io/saurabhbilakhia/portfolio-backend:${IMAGE_TAG}
    container_name: prod-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_VERSION: ${IMAGE_TAG}
      APP_ENVIRONMENT: prod
      BROKER_ENCRYPTION_KEY: ${BROKER_ENCRYPTION_KEY}
      BROKER_GATEWAY_URL: http://broker-gateway-service:8084
      BROKER_SYNC_ENABLED: ${BROKER_SYNC_ENABLED:-true}
      BROKER_SYNC_CRON: ${BROKER_SYNC_CRON:-0 20 16 * * *}
      BROKER_SYNC_CRON_MORNING: ${BROKER_SYNC_CRON_MORNING:-0 0 6 * * *}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ALLOWED_ORIGINS: https://portfolio.nanobyte.ca
      GATEWAY_API_KEY: ${GATEWAY_API_KEY}
    ports:
      - "10080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - prod-network

  ingestion-service:
    image: ghcr.io/saurabhbilakhia/portfolio-ingestion:${IMAGE_TAG}
    container_name: prod-ingestion
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EODHD_API_KEY: ${EODHD_API_KEY:-}
    ports:
      - "10081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - prod-network

  market-data-service:
    image: ghcr.io/saurabhbilakhia/portfolio-market-data:${IMAGE_TAG}
    container_name: prod-market-data
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IBKR_HOST: ib-gateway
      IBKR_PORT: "4001"
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-1}
    ports:
      - "10082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - prod-network

  strategy-service:
    image: ghcr.io/saurabhbilakhia/portfolio-strategy:${IMAGE_TAG}
    container_name: prod-strategy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MARKET_DATA_SERVICE_URL: http://market-data-service:8082
      PORTFOLIO_SERVICE_URL: http://backend:8080
    ports:
      - "10083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - prod-network

  broker-gateway-service:
    image: ghcr.io/saurabhbilakhia/portfolio-broker-gateway:${IMAGE_TAG}
    container_name: prod-broker-gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BROKER_ENCRYPTION_KEY: ${BROKER_ENCRYPTION_KEY}
      GATEWAY_API_KEY: ${GATEWAY_API_KEY}
      IBKR_GATEWAY_ENABLED: "true"
      IBKR_HOST: ib-gateway
      IBKR_PORT: "4001"
      IBKR_GATEWAY_CLIENT_ID: ${IBKR_GATEWAY_CLIENT_ID:-2}
      QUESTRADE_ENABLED: ${QUESTRADE_ENABLED:-false}
      WEALTHSIMPLE_ENABLED: ${WEALTHSIMPLE_ENABLED:-false}
    ports:
      - "10084:8084"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - prod-network

  frontend:
    image: ghcr.io/saurabhbilakhia/portfolio-frontend:${IMAGE_TAG}
    container_name: prod-frontend
    ports:
      - "10000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - prod-network

volumes:
  postgres_data:

networks:
  prod-network:
    driver: bridge
