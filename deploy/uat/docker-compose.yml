services:
  postgres:
    image: postgres:16-alpine
    container_name: uat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - uat-network

  redis:
    image: redis:7-alpine
    container_name: uat-redis
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - uat-network

  backend:
    image: ghcr.io/nanobyte-canada/portfolio-backend:${IMAGE_TAG}
    container_name: uat-backend
    environment:
      SPRING_PROFILES_ACTIVE: uat
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_VERSION: ${IMAGE_TAG}
      APP_ENVIRONMENT: uat
      BROKER_ENCRYPTION_KEY: ${BROKER_ENCRYPTION_KEY}
      BROKER_GATEWAY_URL: http://broker-gateway-service:8084
      BROKER_SYNC_ENABLED: ${BROKER_SYNC_ENABLED:-true}
      BROKER_SYNC_CRON: ${BROKER_SYNC_CRON:-0 20 16 * * *}
      BROKER_SYNC_CRON_MORNING: ${BROKER_SYNC_CRON_MORNING:-0 0 6 * * *}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://uatportfolio.nanobyte.ca/auth/google/callback}
      CORS_ALLOWED_ORIGINS: https://uatportfolio.nanobyte.ca
      GATEWAY_API_KEY: ${GATEWAY_API_KEY}
    ports:
      - "20080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - uat-network

  ingestion-service:
    image: ghcr.io/nanobyte-canada/portfolio-ingestion:${IMAGE_TAG}
    container_name: uat-ingestion
    environment:
      SPRING_PROFILES_ACTIVE: uat
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EODHD_API_KEY: ${EODHD_API_KEY:-}
    ports:
      - "20081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - uat-network

  market-data-service:
    image: ghcr.io/nanobyte-canada/portfolio-market-data:${IMAGE_TAG}
    container_name: uat-market-data
    environment:
      SPRING_PROFILES_ACTIVE: uat
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IBKR_HOST: host.docker.internal
      IBKR_PORT: "14001"
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-1}
    ports:
      - "20082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - uat-network

  strategy-service:
    image: ghcr.io/nanobyte-canada/portfolio-strategy:${IMAGE_TAG}
    container_name: uat-strategy
    environment:
      SPRING_PROFILES_ACTIVE: uat
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MARKET_DATA_SERVICE_URL: http://market-data-service:8082
      PORTFOLIO_SERVICE_URL: http://backend:8080
    ports:
      - "20083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - uat-network

  broker-gateway-service:
    image: ghcr.io/nanobyte-canada/portfolio-broker-gateway:${IMAGE_TAG}
    container_name: uat-broker-gateway
    environment:
      SPRING_PROFILES_ACTIVE: uat
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BROKER_ENCRYPTION_KEY: ${BROKER_ENCRYPTION_KEY}
      GATEWAY_API_KEY: ${GATEWAY_API_KEY}
      IBKR_GATEWAY_ENABLED: "true"
      IBKR_HOST: host.docker.internal
      IBKR_PORT: "14001"
      IBKR_GATEWAY_CLIENT_ID: ${IBKR_GATEWAY_CLIENT_ID:-2}
      QUESTRADE_ENABLED: "true"
      WEALTHSIMPLE_ENABLED: "true"
    ports:
      - "20084:8084"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - uat-network

  frontend:
    image: ghcr.io/nanobyte-canada/portfolio-frontend-uat:${IMAGE_TAG}
    container_name: uat-frontend
    ports:
      - "20000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "5"
    networks:
      - uat-network

volumes:
  postgres_data:

networks:
  uat-network:
    driver: bridge
