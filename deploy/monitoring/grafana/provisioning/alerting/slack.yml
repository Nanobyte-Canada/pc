apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-alerts
    receivers:
      - uid: slack-portfolio
        type: slack
        settings:
          url: "${SLACK_WEBHOOK_URL}"
          title: |
            {{ `{{ .Status | toUpper }}` }} - {{ `{{ .CommonLabels.alertname }}` }}
          text: |
            {{ `{{ range .Alerts }}` }}
            *Alert:* {{ `{{ .Labels.alertname }}` }}
            *Severity:* {{ `{{ .Labels.severity }}` }}
            *Summary:* {{ `{{ .Annotations.summary }}` }}
            *Description:* {{ `{{ .Annotations.description }}` }}
            {{ `{{ end }}` }}

policies:
  - orgId: 1
    receiver: slack-alerts
    group_by:
      - alertname
      - service
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
