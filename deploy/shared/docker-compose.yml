services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:10.30.1t
    container_name: shared-ib-gateway
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: live
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "no"
      VNC_SERVER_PASSWORD: ${IBKR_VNC_PASSWORD:-}
      TWS_PORT: "4001"
    ports:
      - "127.0.0.1:15900:5900"
      - "127.0.0.1:14001:4001"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4001'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - shared-network

networks:
  shared-network:
    driver: bridge
