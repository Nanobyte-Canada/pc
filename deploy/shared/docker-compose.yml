services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:10.30.1t
    container_name: shared-ib-gateway
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: live
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "no"
      VNC_SERVER_PASSWORD: ${IBKR_VNC_PASSWORD:-}
      TWS_PORT: "4001"
      AUTO_RESTART_TIME: "11:59 PM"
      TWOFA_TIMEOUT_ACTION: restart
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"
      EXISTING_SESSION_DETECTED_ACTION: primary
      TZ: America/New_York
    ports:
      - "127.0.0.1:15900:5900"
      - "0.0.0.0:14001:4001"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4001'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - shared-network

  ib-gateway-paper:
    image: ghcr.io/gnzsnz/ib-gateway:10.30.1t
    container_name: shared-ib-gateway-paper
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: paper
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "no"
      VNC_SERVER_PASSWORD: ${IBKR_VNC_PASSWORD:-}
      TWS_PORT: "4002"
      AUTO_RESTART_TIME: "11:59 PM"
      TWOFA_TIMEOUT_ACTION: restart
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"
      EXISTING_SESSION_DETECTED_ACTION: primary
      TZ: America/New_York
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4002'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - shared-network

networks:
  shared-network:
    driver: bridge
