services:
  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-network

  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-network

  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:10.30.1t
    container_name: portfolio-ib-gateway
    environment:
      TWS_USERID: ${IBKR_USERNAME:-}
      TWS_PASSWORD: ${IBKR_PASSWORD:-}
      TRADING_MODE: paper
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "yes"
      VNC_SERVER_PASSWORD: ${IBKR_VNC_PASSWORD:-}
      TWS_PORT: "4002"
    ports:
      - "4002:4002"
      - "5900:5900"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4002"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - portfolio-network

  backend:
    build:
      context: ./backend/portfolio
      dockerfile: Dockerfile
    container_name: portfolio-backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-portfolio}
      DATABASE_USERNAME: ${POSTGRES_USER:-portfolio}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_VERSION: ${APP_VERSION:-0.0.1-SNAPSHOT}
      APP_ENVIRONMENT: local
      BROKER_ENCRYPTION_KEY: ${BROKER_ENCRYPTION_KEY:-}
      BROKER_GATEWAY_URL: http://broker-gateway-service:8084
      BROKER_SYNC_ENABLED: ${BROKER_SYNC_ENABLED:-true}
      BROKER_SYNC_CRON: ${BROKER_SYNC_CRON:-0 20 16 * * *}
      BROKER_SYNC_CRON_MORNING: ${BROKER_SYNC_CRON_MORNING:-0 0 6 * * *}
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    ports:
      - "8080:8080"
      - "5005:5005"  # Debug port
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - portfolio-network

  ingestion-service:
    build:
      context: ./backend/ingestion
      dockerfile: Dockerfile
    container_name: portfolio-ingestion
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-portfolio}
      DATABASE_USERNAME: ${POSTGRES_USER:-portfolio}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EODHD_API_KEY: ${EODHD_API_KEY:-}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - portfolio-network

  market-data-service:
    build:
      context: ./backend
      dockerfile: market-data/Dockerfile
    container_name: portfolio-market-data
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-portfolio}
      DATABASE_USERNAME: ${POSTGRES_USER:-portfolio}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IBKR_HOST: ib-gateway
      IBKR_PORT: "4002"
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-1}
    ports:
      - "8082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - portfolio-network

  strategy-service:
    build:
      context: ./backend
      dockerfile: strategy/Dockerfile
    container_name: portfolio-strategy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-portfolio}
      DATABASE_USERNAME: ${POSTGRES_USER:-portfolio}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MARKET_DATA_SERVICE_URL: http://market-data-service:8082
      PORTFOLIO_SERVICE_URL: http://backend:8080
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - portfolio-network

  broker-gateway-service:
    build:
      context: ./backend
      dockerfile: broker-gateway/Dockerfile
    container_name: portfolio-broker-gateway
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-portfolio}
      DATABASE_USERNAME: ${POSTGRES_USER:-portfolio}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BROKER_ENCRYPTION_KEY: ${BROKER_ENCRYPTION_KEY:-}
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}
      IBKR_GATEWAY_ENABLED: "true"
      IBKR_HOST: ib-gateway
      IBKR_PORT: "4002"
      IBKR_GATEWAY_CLIENT_ID: ${IBKR_GATEWAY_CLIENT_ID:-2}
      QUESTRADE_ENABLED: ${QUESTRADE_ENABLED:-false}
      WEALTHSIMPLE_ENABLED: ${WEALTHSIMPLE_ENABLED:-false}
    ports:
      - "8084:8084"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ib-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - portfolio-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: portfolio-frontend
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_PROXY_BACKEND_URL: http://backend:8080
      VITE_PROXY_INGESTION_URL: http://ingestion-service:8081
      VITE_PROXY_MARKET_DATA_URL: http://market-data-service:8082
      VITE_PROXY_STRATEGY_URL: http://strategy-service:8083
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
    depends_on:
      - backend
      - ingestion-service
      - market-data-service
      - strategy-service
    networks:
      - portfolio-network

volumes:
  postgres_data:

networks:
  portfolio-network:
    driver: bridge
