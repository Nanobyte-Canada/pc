name: SDLC Agent

on:
  issues:
    types: [labeled]
  pull_request_target:
    types: [opened, synchronize]
  repository_dispatch:
    types: [sdlc-phase]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number
        required: true
        default: "39"
      label:
        description: Label that triggered the event
        required: true
        default: "Planning"
      phase:
        description: SDLC phase
        required: true
        default: "planning"
      agent:
        description: Agent to use
        required: true
        default: "planner"
      model:
        description: Model to use
        required: true
        default: "opencode-go/glm-5.2"

env:
  VAULT_ADDR: https://vault.nanobyte.ca

jobs:
  run-agent:
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write
      pull-requests: write
      repository-projects: write
    # Run on SDLC lane labels (Stage 1/2) or repository_dispatch (Stage 3)
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && contains(fromJson('["Triaging","Planning","Executing","Testing","Bug Fixing","Publishing","agent-ready"]'), github.event.label.name)) ||
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'pull_request_target'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch secrets from Vault
        run: |
          echo "Authenticating to Vault..."
          VAULT_TOKEN=$(curl -sf \
            --request POST \
            --data "{\"role_id\": \"${{ secrets.VAULT_ROLE_ID }}\", \"secret_id\": \"${{ secrets.VAULT_SECRET_ID }}\"}" \
            "${VAULT_ADDR}/v1/auth/approle/login" | jq -r '.auth.client_token')

          if [ -z "$VAULT_TOKEN" ] || [ "$VAULT_TOKEN" = "null" ]; then
            echo "::error::Failed to authenticate to Vault"
            exit 1
          fi
          echo "Vault authentication successful"

          APP_NAME="${{ vars.APP_NAME }}"
          if [ -z "$APP_NAME" ]; then
            echo "::error::APP_NAME repository variable is not set — cannot fetch SDLC secrets"
            exit 1
          fi

          echo "Fetching SDLC pipeline secrets..."

          # Tier 1: Org-level shared secrets (same for all repos)
          echo "--- Tier 1: sdlc/common ---"
          JSON=$(curl -sf \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            "${VAULT_ADDR}/v1/secret/data/sdlc/common" | jq -r '.data.data // "{}"')
          if [ "$JSON" != "{}" ]; then
            echo "$JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"
            echo "Exported $(echo "$JSON" | jq -r 'keys | length') keys from sdlc/common"
          else
            echo "No secrets found at sdlc/common — skipping"
          fi

          # Tier 2: App-level shared secrets (repo-specific, shared across envs)
          echo "--- Tier 2: ${APP_NAME}/common ---"
          JSON=$(curl -sf \
            --header "X-Vault-Token: ${VAULT_TOKEN}" \
            "${VAULT_ADDR}/v1/secret/data/${APP_NAME}/common" | jq -r '.data.data // "{}"')
          if [ "$JSON" != "{}" ]; then
            echo "$JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"
            echo "Exported $(echo "$JSON" | jq -r 'keys | length') keys from ${APP_NAME}/common"
          else
            echo "No secrets found at ${APP_NAME}/common — skipping"
          fi

          # Tier 3: Env-specific secrets (always fetch both — key names differ)
          for VAULT_ENV in uat prod; do
            echo "--- Tier 3: ${APP_NAME}/${VAULT_ENV} ---"
            JSON=$(curl -sf \
              --header "X-Vault-Token: ${VAULT_TOKEN}" \
              "${VAULT_ADDR}/v1/secret/data/${APP_NAME}/${VAULT_ENV}" | jq -r '.data.data // "{}"')
            if [ "$JSON" != "{}" ]; then
              echo "$JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"
              echo "Exported $(echo "$JSON" | jq -r 'keys | length') keys from ${APP_NAME}/${VAULT_ENV}"
            fi
          done

      - name: Bootstrap shared opencode config + scripts
        run: |
          rm -rf /tmp/nbs
          git clone --depth 1 https://x-access-token:${NANOBYTE_SERVICES_TOKEN}@github.com/${{ github.repository_owner }}/nanobyte-services /tmp/nbs
          # Copy shared config, then let repo-specific .opencode/ override
          mkdir -p .opencode/agents
          cp -r /tmp/nbs/sdlc/opencode/agents/* .opencode/agents/
          cp /tmp/nbs/sdlc/opencode/opencode.json .opencode/ 2>/dev/null || true
          # Verify planner agent was loaded (critical for SDLC)
          if [ ! -f .opencode/agents/planner.md ]; then
            echo "::error::planner.md not found after bootstrap — check nanobyte-services clone"
            exit 1
          fi
          # Copy shared scripts (update-card-status.sh, etc.)
          mkdir -p scripts
          cp /tmp/nbs/sdlc/scripts/update-card-status.sh scripts/ 2>/dev/null || true
          chmod +x scripts/update-card-status.sh 2>/dev/null || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Install GitHub CLI (gh)
        run: |
          which gh >/dev/null 2>&1 && echo "gh already installed" || {
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            echo 'deb [signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main' | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update -qq && sudo apt-get install -y -qq gh
          }
        shell: bash

      - name: Configure opencode auth
        run: |
          mkdir -p ~/.local/share/opencode
          echo "$OPENCODE_AUTH_JSON" > ~/.local/share/opencode/auth.json

      - name: Determine agent + model + issue + phase
        id: params
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_NUM=${{ github.event.issue.number }}
            LABEL="${{ github.event.label.name }}"
            case "$LABEL" in
              Triaging)
                echo "agent=planner" >> $GITHUB_OUTPUT
                echo "model=opencode-go/glm-5.2" >> $GITHUB_OUTPUT
                echo "phase=triaging" >> $GITHUB_OUTPUT
                ;;
              Planning)
                echo "agent=planner" >> $GITHUB_OUTPUT
                echo "model=opencode-go/glm-5.2" >> $GITHUB_OUTPUT
                echo "phase=planning" >> $GITHUB_OUTPUT
                ;;
              Executing)
                echo "agent=build" >> $GITHUB_OUTPUT
                echo "model=opencode-go/deepseek-v4-pro" >> $GITHUB_OUTPUT
                echo "phase=execution" >> $GITHUB_OUTPUT
                ;;
              Testing)
                echo "agent=tester" >> $GITHUB_OUTPUT
                echo "model=opencode-go/glm-5.2" >> $GITHUB_OUTPUT
                echo "phase=testing" >> $GITHUB_OUTPUT
                ;;
              Bug\ Fixing)
                echo "agent=bugfixer" >> $GITHUB_OUTPUT
                echo "model=opencode-go/deepseek-v4-pro" >> $GITHUB_OUTPUT
                echo "phase=bugfix" >> $GITHUB_OUTPUT
                ;;
              Publishing)
                echo "agent=deployer" >> $GITHUB_OUTPUT
                echo "model=opencode-go/glm-5.2" >> $GITHUB_OUTPUT
                echo "phase=publish" >> $GITHUB_OUTPUT
                ;;
            esac
            echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "agent=${{ github.event.inputs.agent }}" >> $GITHUB_OUTPUT
            echo "model=${{ github.event.inputs.model }}" >> $GITHUB_OUTPUT
            echo "issue_number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "phase=${{ github.event.inputs.phase }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request_target" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
            echo "agent=reviewer" >> $GITHUB_OUTPUT
            echo "model=opencode-go/glm-5.2" >> $GITHUB_OUTPUT
            echo "phase=review" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            # Resolve ISSUE_NUMBER from PR body (Implements #N, Closes #N, Fixes #N)
            PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
            ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(?:Implements|Closes|Resolves|Fixes) #\K[0-9]+' | head -1 || echo "0")
            echo "issue_number=${ISSUE_NUM:-0}" >> $GITHUB_OUTPUT
            # Review round: read from prior review comments, default to 1
            echo "review_round=1" >> $GITHUB_OUTPUT
            echo "last_reviewed_sha=" >> $GITHUB_OUTPUT
          else
            echo "agent=${{ github.event.client_payload.agent }}" >> $GITHUB_OUTPUT
            echo "model=${{ github.event.client_payload.model }}" >> $GITHUB_OUTPUT
            echo "issue_number=${{ github.event.client_payload.issue_number }}" >> $GITHUB_OUTPUT
            echo "phase=${{ github.event.client_payload.phase }}" >> $GITHUB_OUTPUT
            # Pass through reviewer params for review-fix phase
            echo "pr_number=${{ github.event.client_payload.pr_number || '' }}" >> $GITHUB_OUTPUT
            echo "review_round=${{ github.event.client_payload.review_round || '' }}" >> $GITHUB_OUTPUT
            echo "last_reviewed_sha=${{ github.event.client_payload.last_reviewed_sha || '' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run phase agent
        run: |
          opencode run \
            --agent "${{ steps.params.outputs.agent }}" \
            --model "${{ steps.params.outputs.model }}" \
            --format json \
            --dangerously-skip-permissions \
            "Process issue #${{ steps.params.outputs.issue_number }} — phase: ${{ steps.params.outputs.phase }}"
        env:
          GH_TOKEN: ${{ env.GH_PROJECT_TOKEN }}
          ISSUE_NUMBER: ${{ steps.params.outputs.issue_number }}
          PHASE: ${{ steps.params.outputs.phase }}
          PR_NUMBER: ${{ steps.params.outputs.pr_number }}
          REVIEW_ROUND: ${{ steps.params.outputs.review_round }}
          LAST_REVIEWED_SHA: ${{ steps.params.outputs.last_reviewed_sha }}
          PROJECT_ID: ${{ env.SDLC_PROJECT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          UAT_API_URL: ${{ env.UAT_API_URL }}
          PROD_API_URL: ${{ env.PROD_API_URL }}
