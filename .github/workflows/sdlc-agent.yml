name: SDLC Agent

on:
  issues:
    types: [labeled]
  pull_request_target:
    types: [opened, synchronize]
  repository_dispatch:
    types: [sdlc-phase]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number
        required: true
        default: "39"
      label:
        description: Label that triggered the event
        required: true
        default: "Planning"
      phase:
        description: SDLC phase
        required: true
        default: "planning"
      agent:
        description: Agent to use
        required: true
        default: "planner"
      model:
        description: Model to use
        required: true
        default: "opencode-go/glm-5.2"

jobs:
  run-agent:
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write
      pull-requests: write
      repository-projects: write
    # Run on SDLC lane labels (Stage 1/2) or repository_dispatch (Stage 3)
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && contains(fromJson('["Triaging","Planning","Executing","Testing","Bug Fixing","Publishing","agent-ready"]'), github.event.label.name)) ||
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'pull_request_target'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bootstrap shared opencode config + scripts
        env:
          NANOBYTE_TOKEN: ${{ secrets.NANOBYTE_SERVICES_TOKEN }}
        run: |
          rm -rf /tmp/nbs
          git clone --depth 1 https://x-access-token:${NANOBYTE_TOKEN}@github.com/${{ github.repository_owner }}/nanobyte-services /tmp/nbs
          # Copy shared config, then let repo-specific .opencode/ override
          cp -r /tmp/nbs/sdlc/opencode/* .opencode/ 2>/dev/null || true
          # Copy shared scripts (update-card-status.sh, etc.)
          mkdir -p scripts
          cp /tmp/nbs/sdlc/scripts/update-card-status.sh scripts/ 2>/dev/null || true
          chmod +x scripts/update-card-status.sh 2>/dev/null || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Install GitHub CLI (gh)
        run: |
          which gh >/dev/null 2>&1 && echo "gh already installed" || {
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            echo 'deb [signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main' | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update -qq && sudo apt-get install -y -qq gh
          }
        shell: bash

      - name: Configure opencode auth
        run: |
          mkdir -p ~/.local/share/opencode
          echo '${{ secrets.OPENCODE_AUTH_JSON }}' > ~/.local/share/opencode/auth.json

      - name: Determine agent + model + issue + phase
        id: params
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            ISSUE_NUM=${{ github.event.issue.number }}
            LABEL="${{ github.event.label.name }}"
            case "$LABEL" in
              Triaging)
                echo "agent=planner" >> $GITHUB_OUTPUT
                echo "model=opencode-go/glm-5.2" >> $GITHUB_OUTPUT
                echo "phase=triaging" >> $GITHUB_OUTPUT
                ;;
              Planning)
                echo "agent=planner" >> $GITHUB_OUTPUT
                echo "model=opencode-go/glm-5.2" >> $GITHUB_OUTPUT
                echo "phase=planning" >> $GITHUB_OUTPUT
                ;;
              Executing)
                echo "agent=build" >> $GITHUB_OUTPUT
                echo "model=opencode-go/deepseek-v4-pro" >> $GITHUB_OUTPUT
                echo "phase=execution" >> $GITHUB_OUTPUT
                ;;
              Testing)
                echo "agent=tester" >> $GITHUB_OUTPUT
                echo "model=opencode-go/glm-5.2" >> $GITHUB_OUTPUT
                echo "phase=testing" >> $GITHUB_OUTPUT
                ;;
              Bug\ Fixing)
                echo "agent=bugfixer" >> $GITHUB_OUTPUT
                echo "model=opencode-go/deepseek-v4-pro" >> $GITHUB_OUTPUT
                echo "phase=bugfix" >> $GITHUB_OUTPUT
                ;;
              Publishing)
                echo "agent=deployer" >> $GITHUB_OUTPUT
                echo "model=opencode-go/glm-5.2" >> $GITHUB_OUTPUT
                echo "phase=publish" >> $GITHUB_OUTPUT
                ;;
            esac
            echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "agent=${{ github.event.inputs.agent }}" >> $GITHUB_OUTPUT
            echo "model=${{ github.event.inputs.model }}" >> $GITHUB_OUTPUT
            echo "issue_number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "phase=${{ github.event.inputs.phase }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request_target" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
            echo "agent=reviewer" >> $GITHUB_OUTPUT
            echo "model=opencode-go/glm-5.2" >> $GITHUB_OUTPUT
            echo "phase=review" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            # Resolve ISSUE_NUMBER from PR body (Implements #N, Closes #N, Fixes #N)
            PR_BODY="${{ github.event.pull_request.body }}"
            ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(?:Implements|Closes|Resolves|Fixes) #\K[0-9]+' | head -1 || echo "0")
            echo "issue_number=${ISSUE_NUM:-0}" >> $GITHUB_OUTPUT
            # Review round: read from prior review comments, default to 1
            echo "review_round=1" >> $GITHUB_OUTPUT
            echo "last_reviewed_sha=" >> $GITHUB_OUTPUT
          else
            echo "agent=${{ github.event.client_payload.agent }}" >> $GITHUB_OUTPUT
            echo "model=${{ github.event.client_payload.model }}" >> $GITHUB_OUTPUT
            echo "issue_number=${{ github.event.client_payload.issue_number }}" >> $GITHUB_OUTPUT
            echo "phase=${{ github.event.client_payload.phase }}" >> $GITHUB_OUTPUT
            # Pass through reviewer params for review-fix phase
            echo "pr_number=${{ github.event.client_payload.pr_number || '' }}" >> $GITHUB_OUTPUT
            echo "review_round=${{ github.event.client_payload.review_round || '' }}" >> $GITHUB_OUTPUT
            echo "last_reviewed_sha=${{ github.event.client_payload.last_reviewed_sha || '' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run phase agent
        run: |
          opencode run \
            --agent "${{ steps.params.outputs.agent }}" \
            --model "${{ steps.params.outputs.model }}" \
            --format json \
            --dangerously-skip-permissions \
            "Process issue #${{ steps.params.outputs.issue_number }} — phase: ${{ steps.params.outputs.phase }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          ISSUE_NUMBER: ${{ steps.params.outputs.issue_number }}
          PHASE: ${{ steps.params.outputs.phase }}
          PR_NUMBER: ${{ steps.params.outputs.pr_number }}
          REVIEW_ROUND: ${{ steps.params.outputs.review_round }}
          LAST_REVIEWED_SHA: ${{ steps.params.outputs.last_reviewed_sha }}
          PROJECT_ID: ${{ secrets.SDLC_PROJECT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          UAT_API_URL: ${{ vars.UAT_API_URL }}
          PROD_API_URL: ${{ vars.PROD_API_URL }}
