name: Deploy to VPS (Development)

on:
  push:
    branches: [development]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/portfolio

jobs:
  # Run tests before deployment
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          # Create a tarball of the application (excluding node_modules, build artifacts)
          tar --exclude='node_modules' \
              --exclude='frontend/dist' \
              --exclude='backend/build' \
              --exclude='.git' \
              --exclude='*.log' \
              -czf deploy.tar.gz \
              backend frontend docker-compose.vps.yml

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: /opt/portfolio

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          BROKER_ENCRYPTION_KEY: ${{ secrets.BROKER_ENCRYPTION_KEY }}
          QUESTRADE_CLIENT_ID: ${{ secrets.QUESTRADE_CLIENT_ID }}
          QUESTRADE_CLIENT_SECRET: ${{ secrets.QUESTRADE_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SIGNING_KEY,EODHD_API_KEY,ALPHA_VANTAGE_API_KEY,BROKER_ENCRYPTION_KEY,QUESTRADE_CLIENT_ID,QUESTRADE_CLIENT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GITHUB_SHA
          script: |
            set -e
            cd /opt/portfolio

            # Backup current deployment
            if [ -d "current" ]; then
              rm -rf previous
              mv current previous
            fi

            # Extract new deployment
            mkdir -p current
            tar -xzf deploy.tar.gz -C current
            rm deploy.tar.gz

            cd current

            # Create .env file with secrets (using echo to avoid whitespace issues)
            echo "POSTGRES_DB=portfolio" > .env
            echo "POSTGRES_USER=portfolio" >> .env
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
            echo "APP_VERSION=$GITHUB_SHA" >> .env
            echo "APP_ENVIRONMENT=dev" >> .env
            echo "SPRING_PROFILES_ACTIVE=dev" >> .env
            echo "JWT_SIGNING_KEY=$JWT_SIGNING_KEY" >> .env
            echo "EODHD_API_KEY=$EODHD_API_KEY" >> .env
            echo "ALPHA_VANTAGE_API_KEY=$ALPHA_VANTAGE_API_KEY" >> .env
            echo "BROKER_ENCRYPTION_KEY=$BROKER_ENCRYPTION_KEY" >> .env
            echo "QUESTRADE_CLIENT_ID=$QUESTRADE_CLIENT_ID" >> .env
            echo "QUESTRADE_CLIENT_SECRET=$QUESTRADE_CLIENT_SECRET" >> .env
            echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> .env
            echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> .env

            # Build and deploy with docker compose
            docker compose -f docker-compose.vps.yml down || true
            docker compose -f docker-compose.vps.yml build --no-cache
            docker compose -f docker-compose.vps.yml up -d

            # Wait for services to be healthy
            echo "Waiting for services to start..."
            sleep 30

            # Health check
            if curl -f http://localhost:8080/health; then
              echo ""
              echo "Backend is healthy"
            else
              echo "Backend health check failed"
              docker compose -f docker-compose.vps.yml logs backend
              exit 1
            fi

            # Cleanup old images
            docker image prune -f

            echo "Deployment completed successfully!"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/portfolio
            if [ -d "previous" ]; then
              echo "Rolling back to previous deployment..."
              rm -rf current
              mv previous current
              cd current
              docker compose -f docker-compose.vps.yml up -d
              echo "Rollback completed"
            else
              echo "No previous deployment to rollback to"
            fi
