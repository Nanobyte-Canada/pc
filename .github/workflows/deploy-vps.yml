name: Deploy to VPS (Development)

on:
  push:
    branches: [development]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/portfolio

jobs:
  # Run tests before deployment
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          # Create a tarball of the application (excluding node_modules, build artifacts)
          tar --exclude='node_modules' \
              --exclude='frontend/dist' \
              --exclude='backend/build' \
              --exclude='.git' \
              --exclude='*.log' \
              -czf deploy.tar.gz \
              backend frontend docker-compose.vps.yml portfolio_dump.backup

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: /opt/portfolio

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          BROKER_ENCRYPTION_KEY: ${{ secrets.BROKER_ENCRYPTION_KEY }}
          QUESTRADE_CLIENT_ID: ${{ secrets.QUESTRADE_CLIENT_ID }}
          QUESTRADE_CLIENT_SECRET: ${{ secrets.QUESTRADE_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: POSTGRES_PASSWORD,JWT_SIGNING_KEY,EODHD_API_KEY,ALPHA_VANTAGE_API_KEY,BROKER_ENCRYPTION_KEY,QUESTRADE_CLIENT_ID,QUESTRADE_CLIENT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GITHUB_SHA
          script: |
            set -e
            cd /opt/portfolio

            echo "=== Starting deployment ==="
            echo "Current directory: $(pwd)"
            echo "Contents before deployment:"
            ls -la

            # Check if tarball exists
            if [ ! -f "deploy.tar.gz" ]; then
              echo "ERROR: deploy.tar.gz not found in /opt/portfolio"
              echo "Contents of /opt/portfolio:"
              ls -la /opt/portfolio
              exit 1
            fi

            echo "Tarball size: $(ls -lh deploy.tar.gz | awk '{print $5}')"
            echo "Tarball contents preview:"
            tar -tzf deploy.tar.gz | head -20

            # Backup current deployment
            if [ -d "current" ]; then
              echo "Backing up current deployment to previous/"
              rm -rf previous
              mv current previous
            fi

            # Extract new deployment
            echo "Extracting deployment package..."
            mkdir -p current
            tar -xzf deploy.tar.gz -C current
            rm deploy.tar.gz

            cd current
            echo "Extracted to: $(pwd)"
            echo "Contents after extraction:"
            ls -la

            # Verify critical files exist
            if [ ! -f "docker-compose.vps.yml" ]; then
              echo "ERROR: docker-compose.vps.yml not found after extraction!"
              echo "Contents of current directory:"
              ls -la
              exit 1
            fi

            if [ ! -d "backend" ]; then
              echo "ERROR: backend directory not found after extraction!"
              exit 1
            fi

            if [ ! -d "frontend" ]; then
              echo "ERROR: frontend directory not found after extraction!"
              exit 1
            fi

            echo "All required files verified successfully"

            # Create .env file with secrets (using echo to avoid whitespace issues)
            echo "POSTGRES_DB=portfolio" > .env
            echo "POSTGRES_USER=portfolio" >> .env
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
            echo "APP_VERSION=$GITHUB_SHA" >> .env
            echo "APP_ENVIRONMENT=dev" >> .env
            echo "SPRING_PROFILES_ACTIVE=dev" >> .env
            echo "JWT_SIGNING_KEY=$JWT_SIGNING_KEY" >> .env
            echo "EODHD_API_KEY=$EODHD_API_KEY" >> .env
            echo "ALPHA_VANTAGE_API_KEY=$ALPHA_VANTAGE_API_KEY" >> .env
            echo "BROKER_ENCRYPTION_KEY=$BROKER_ENCRYPTION_KEY" >> .env
            echo "QUESTRADE_CLIENT_ID=$QUESTRADE_CLIENT_ID" >> .env
            echo "QUESTRADE_CLIENT_SECRET=$QUESTRADE_CLIENT_SECRET" >> .env
            echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> .env
            echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> .env

            # Verify .env was created
            echo ".env file created with $(wc -l < .env) lines"

            # Verify we're in the right directory with the right files
            echo "=== Pre-docker compose verification ==="
            echo "Working directory: $(pwd)"
            echo "docker-compose.vps.yml exists: $(test -f docker-compose.vps.yml && echo 'YES' || echo 'NO')"
            echo "backend/Dockerfile exists: $(test -f backend/Dockerfile && echo 'YES' || echo 'NO')"
            echo "frontend/Dockerfile exists: $(test -f frontend/Dockerfile && echo 'YES' || echo 'NO')"

            # Build and deploy with docker compose
            echo "=== Stopping existing containers ==="
            docker compose -f docker-compose.vps.yml down || true

            echo "=== Building containers ==="
            docker compose -f docker-compose.vps.yml build --no-cache

            # Phase 1: Start postgres only and wait for it to be healthy
            echo "=== Starting postgres ==="
            docker compose -f docker-compose.vps.yml up -d postgres
            echo "Waiting for postgres to be ready..."
            until docker compose -f docker-compose.vps.yml exec -T postgres pg_isready -U portfolio; do
              sleep 2
            done
            echo "Postgres is ready"

            # Phase 2: Restore database from backup
            echo "=== Restoring database from backup ==="
            docker cp portfolio_dump.backup portfolio-postgres:/tmp/portfolio_dump.backup
            docker compose -f docker-compose.vps.yml exec -T postgres \
              pg_restore --clean --if-exists --no-owner --no-privileges \
              -U portfolio -d portfolio /tmp/portfolio_dump.backup || true
            docker compose -f docker-compose.vps.yml exec -T postgres \
              rm -f /tmp/portfolio_dump.backup
            echo "Database restore completed"

            # Phase 3: Start backend + frontend
            echo "=== Starting all containers ==="
            docker compose -f docker-compose.vps.yml up -d

            echo "=== Container status ==="
            docker compose -f docker-compose.vps.yml ps

            # Wait for services to be healthy
            echo "Waiting for services to start..."
            sleep 30

            # Health check
            echo "=== Health check ==="
            if curl -f http://localhost:8080/health; then
              echo ""
              echo "Backend is healthy"
            else
              echo "Backend health check failed"
              echo "=== Backend logs ==="
              docker compose -f docker-compose.vps.yml logs backend
              echo "=== All container logs ==="
              docker compose -f docker-compose.vps.yml logs --tail=50
              exit 1
            fi

            # Cleanup old images
            docker image prune -f

            echo "=== Deployment completed successfully! ==="

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            echo "=== Rollback triggered ==="
            cd /opt/portfolio
            echo "Current directory contents:"
            ls -la

            if [ -d "previous" ]; then
              echo "Rolling back to previous deployment..."
              rm -rf current
              mv previous current
              cd current
              echo "Rollback directory contents:"
              ls -la
              if [ -f "docker-compose.vps.yml" ]; then
                docker compose -f docker-compose.vps.yml up -d
                echo "Rollback completed"
              else
                echo "ERROR: docker-compose.vps.yml not found in previous deployment"
              fi
            else
              echo "No previous deployment to rollback to"
            fi
