name: PR Review (Reusable)

on:
  workflow_call:
    inputs:
      config_path:
        description: 'Path to review config (relative to repo root)'
        type: string
        default: '.github/review-config.yml'
      fail_on_high:
        description: 'Fail the build on HIGH severity findings'
        type: boolean
        default: true
      max_diff_bytes:
        description: 'Maximum diff size before truncation'
        type: number
        default: 30720
    secrets:
      api_key:
        description: 'OpenCode Go API key (from opencode.ai/auth)'
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Configure OpenCode auth
        run: |
          mkdir -p ~/.local/share/opencode
          cat > ~/.local/share/opencode/auth.json << EOF
          {
            "opencode-go": {
              "type": "api",
              "key": "${{ secrets.api_key }}"
            }
          }
          EOF

      - name: Stage 1 — Classifier
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p /tmp/review
          bash scripts/classify.sh --base "$BASE_SHA" --head "$HEAD_SHA" \
            --config "${{ inputs.config_path }}" 2>&1 | tee /tmp/review/classify-output.txt

          CLASS_JSON=$(cat /tmp/review/classifier-output.json)
          echo "skip_review=$(echo $CLASS_JSON | jq -r '.skip_review')" >> $GITHUB_OUTPUT
          echo "has_code=$(echo $CLASS_JSON | jq -r '.has_code')" >> $GITHUB_OUTPUT
          echo "has_docs=$(echo $CLASS_JSON | jq -r '.has_docs')" >> $GITHUB_OUTPUT
          echo "has_structural=$(echo $CLASS_JSON | jq -r '.has_structural_targets')" >> $GITHUB_OUTPUT

      - name: Post skip comment (non-code changes)
        if: steps.classify.outputs.skip_review == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: '## PR Review\n\nSkipping automated review — no code changes detected.'
            });

      - name: Generate PR diff
        if: steps.classify.outputs.skip_review != 'true'
        run: |
          mkdir -p /tmp/review
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          MAX_SIZE=${{ inputs.max_diff_bytes }}

          git diff "$BASE_SHA...$HEAD_SHA" > /tmp/review/pr_diff.diff

          FULL_SIZE=$(wc -c < /tmp/review/pr_diff.diff)
          if [ "$FULL_SIZE" -gt "$MAX_SIZE" ]; then
            head -c "$MAX_SIZE" /tmp/review/pr_diff.diff > /tmp/review/pr_diff_truncated.diff
            echo "" >> /tmp/review/pr_diff_truncated.diff
            echo "... (diff truncated at ${MAX_SIZE} bytes from ${FULL_SIZE} bytes)" >> /tmp/review/pr_diff_truncated.diff
            mv /tmp/review/pr_diff_truncated.diff /tmp/review/pr_diff.diff
          fi

      - name: Stage 2 — Structural Checker
        if: steps.classify.outputs.skip_review != 'true' && steps.classify.outputs.has_structural == 'true'
        run: bash scripts/structural.sh

      - name: Stage 3 — LLM Code Review
        if: steps.classify.outputs.skip_review != 'true' && steps.classify.outputs.has_code == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/llm-review.sh --type code

      - name: Stage 4 — LLM Doc Review
        if: steps.classify.outputs.skip_review != 'true' && steps.classify.outputs.has_docs == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/llm-review.sh --type docs

      - name: Stage 5 — Aggregator
        id: aggregate
        if: steps.classify.outputs.skip_review != 'true'
        run: bash scripts/aggregate.sh

      - name: Post PR comment
        if: steps.classify.outputs.skip_review != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/post-comment.sh

      - name: Warn on zero findings
        if: steps.classify.outputs.skip_review != 'true' && steps.aggregate.outputs.high_count == '0' && steps.aggregate.outputs.low_count == '0'
        run: |
          echo "::warning::Review produced 0 findings on a code diff. Consider a manual review."

      - name: Fail build on HIGH findings
        if: steps.classify.outputs.skip_review != 'true' && inputs.fail_on_high && steps.aggregate.outputs.high_count != '0'
        run: |
          echo "::error::Build failed: ${{ steps.aggregate.outputs.high_count }} HIGH severity findings found."
          exit 1
