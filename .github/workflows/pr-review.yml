name: PR Review (Reusable)

on:
  workflow_call:
    inputs:
      model:
        description: 'OpenCode model (provider/model), e.g. opencode/claude-sonnet-4-6'
        type: string
        required: false
        default: 'opencode/deepseek-v4-flash-free'
    secrets:
      api_key:
        description: 'OpenCode Zen API key (from opencode.ai/auth)'
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Gather PR context
        id: context
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || '' }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha || '' }}"

          if [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA" ]; then
            echo "No PR event context. Required for diff generation."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          git diff "$BASE_SHA...$HEAD_SHA" > /tmp/pr_diff.diff
          echo "diff_size=$(wc -c < /tmp/pr_diff.diff)" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

          git diff --name-only "$BASE_SHA...$HEAD_SHA" > /tmp/changed_files.txt
          echo "changed_files=$(wc -l < /tmp/changed_files.txt)" >> $GITHUB_OUTPUT

          cat /tmp/changed_files.txt

      - name: Attach contributing.md if present
        if: steps.context.outputs.skip != 'true'
        run: |
          for f in CONTRIBUTING.md .github/CONTRIBUTING.md docs/CONTRIBUTING.md; do
            if [ -f "$f" ]; then
              cp "$f" /tmp/contributing.md
              echo "Attached $f"
              break
            fi
          done

      - name: Configure OpenCode auth
        if: steps.context.outputs.skip != 'true'
        run: |
          mkdir -p ~/.local/share/opencode
          cat > ~/.local/share/opencode/auth.json << EOF
          {
            "opencode": {
              "type": "api",
              "key": "${{ secrets.api_key }}"
            }
          }
          EOF

      - name: Run PR Review with OpenCode
        if: steps.context.outputs.skip != 'true'
        timeout-minutes: 15
        run: |
          ADDITIONAL_FILES=""
          for f in /tmp/contributing.md /tmp/pr_diff.diff; do
            [ -f "$f" ] && ADDITIONAL_FILES="$ADDITIONAL_FILES --file $f"
          done

          REVIEW_PROMPT=$(cat << 'PROMPT_EOF'
          You are an expert PR reviewer. Analyze the attached diff (and contributing.md if provided) across three dimensions:

          1. CODE QUALITY REVIEW:
          - Redundant/duplicate code patterns
          - Violations of SOLID/OOP principles (single responsibility, open-closed, Liskov substitution, interface segregation, dependency inversion)
          - Logic gaps: missing edge cases, null-safety issues, inadequate error handling, boundary condition bugs
          - Logging: appropriate levels (info/warn/error), meaningful messages, sufficient context data
          - Test coverage: missing unit tests for core logic, missing integration tests for critical paths, untested edge cases
          - Linting violations (check for trailing whitespace, unused imports, inconsistent naming)
          - Performance: nested loops, N+1 queries, unnecessarily large allocations, sync operations in async paths
          - Breaking changes: API contract changes, database schema migrations, interface signature changes, removed exports
          - Contributing.md compliance (if present)

          2. DOCUMENTATION REVIEW:
          - Code changes that should be reflected in documentation
          - Missing or stale ADR records
          - Backend API docs, frontend component docs, database schema docs, infrastructure config docs out of sync
          - Missing JSDoc/KDoc for public APIs

          3. SECURITY REVIEW:
          - Vulnerable dependency patterns (unpinned versions, known-vulnerable packages)
          - Authorization gaps (missing role checks, exposed admin endpoints)
          - Injection risks (SQL, NoSQL, command injection, XSS)
          - Sensitive data exposure (secrets in code, missing encryption)
          - Authentication weaknesses (token validation, session handling)

          OUTPUT RULES:
          - Prefix each finding with [HIGH] or [LOW]
          - [HIGH] = breaking changes, security vulnerabilities, logic bugs, missing critical tests, performance issues, authorization gaps
          - [LOW] = style suggestions, minor doc gaps, refactoring opportunities, non-critical warnings

          FORMAT EACH FINDING AS:
          [SEVERITY] Category: Description
          Location: file:line (or N/A)
          Suggestion: how to fix or improve

          Separate findings with "---"
          End with a summary line: SUMMARY: X HIGH, Y LOW
          PROMPT_EOF
          )

          opencode run --model "${{ inputs.model }}" $ADDITIONAL_FILES "$REVIEW_PROMPT" 2>&1 | tee /tmp/review_output.txt

      - name: Parse results and count findings
        if: steps.context.outputs.skip != 'true'
        id: parse
        run: |
          HIGH_COUNT=$(grep -c '^\[HIGH\]' /tmp/review_output.txt || true)
          LOW_COUNT=$(grep -c '^\[LOW\]' /tmp/review_output.txt || true)

          echo "HIGH_COUNT=$HIGH_COUNT" >> $GITHUB_OUTPUT
          echo "LOW_COUNT=$LOW_COUNT" >> $GITHUB_OUTPUT

          echo "Findings: $HIGH_COUNT HIGH, $LOW_COUNT LOW"

          grep -n 'SUMMARY:' /tmp/review_output.txt || true

      - name: Post PR comment with review results
        if: steps.context.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          HIGH_COUNT: ${{ steps.parse.outputs.HIGH_COUNT }}
          LOW_COUNT: ${{ steps.parse.outputs.LOW_COUNT }}
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('/tmp/review_output.txt', 'utf8').trim();
            const highCount = parseInt(process.env.HIGH_COUNT || '0');
            const lowCount = parseInt(process.env.LOW_COUNT || '0');

            if (!reviewText) {
              console.log('No review output to post');
              return;
            }

            let prefix = '## OpenCode PR Review\n\n';
            prefix += '| Severity | Count |\n|----------|-------|\n';
            prefix += `| 🔴 **HIGH** | ${highCount} |\n`;
            prefix += `| 🟡 **LOW** | ${lowCount} |\n\n`;

            if (highCount > 0) {
              prefix += `> ⚠️ **${highCount} HIGH severity ${highCount === 1 ? 'issue' : 'issues'} found — build will fail.**\n\n`;
            }

            const maxBodyLen = 60000;
            const truncated = reviewText.length > maxBodyLen
              ? reviewText.substring(0, maxBodyLen) + '\n\n...(output truncated)'
              : reviewText;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: prefix + '---\n\n' + truncated
            });

            console.log(`PR comment posted: ${highCount} HIGH, ${lowCount} LOW`);

      - name: Fail build on HIGH findings
        if: steps.context.outputs.skip != 'true' && steps.parse.outputs.HIGH_COUNT != '0'
        run: |
          echo "::error::Build failed: ${{ steps.parse.outputs.HIGH_COUNT }} HIGH severity findings found. Check the PR comment for details."
          exit 1

      - name: Pass build on LOW-only findings
        if: steps.context.outputs.skip != 'true' && steps.parse.outputs.HIGH_COUNT == '0' && steps.parse.outputs.LOW_COUNT != '0'
        run: |
          echo "::notice::${{ steps.parse.outputs.LOW_COUNT }} LOW severity findings found (non-blocking)."
