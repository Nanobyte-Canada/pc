name: SDLC Review Loop

on:
  workflow_run:
    workflows: ["PR Review (Reusable)"]
    types: [completed]

jobs:
  review-loop:
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
    if: github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Manually clean workspace (handle root-owned build artifacts)
        run: |
          # actions/checkout@v4 fails to clean the workspace when build artifacts
          # are owned by root (e.g., .gradle, .kotlin dirs). Clean them first with sudo.
          sudo rm -rf "${{ github.workspace }}"/* 2>/dev/null || true
          sudo rm -rf "${{ github.workspace }}"/.gitignore 2>/dev/null || true

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Bootstrap shared scripts
        env:
          NANOBYTE_TOKEN: ${{ secrets.NANOBYTE_SERVICES_TOKEN }}
        run: |
          rm -rf /tmp/nbs
          git clone --depth 1 https://x-access-token:${NANOBYTE_TOKEN}@github.com/${{ github.repository_owner }}/nanobyte-services /tmp/nbs
          mkdir -p scripts
          cp /tmp/nbs/sdlc/scripts/update-card-status.sh scripts/
          chmod +x scripts/update-card-status.sh

      - name: Get PR number and linked issue
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR number from workflow_run event
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"

          # Fallback: look up PR by head SHA
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/$HEAD_SHA/pulls --jq '.[0].number' 2>/dev/null || echo "")
          fi

          # Exit early if no PR number found
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "number=" >> $GITHUB_OUTPUT
            echo "issue_number=0" >> $GITHUB_OUTPUT
            echo "found_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

          # Resolve the linked issue number from the PR body (e.g., "Closes #42")
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null || echo "")
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(?:Closes|Resolves|Fixes) #\K[0-9]+' | head -1 || echo "0")
          if [ -z "$ISSUE_NUM" ] || [ "$ISSUE_NUM" = "0" ]; then
            ISSUE_NUM=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null | grep -oP '(?:Closes|Resolves|Fixes) #\K[0-9]+' | head -1 || echo "0")
          fi
          echo "issue_number=${ISSUE_NUM:-0}" >> $GITHUB_OUTPUT
          echo "found_pr=true" >> $GITHUB_OUTPUT

      - name: Exit if no PR found
        if: steps.pr.outputs.found_pr != 'true'
        run: echo "No PR associated with this workflow run. Exiting."

      - name: Parse review findings
        if: steps.pr.outputs.found_pr == 'true'
        id: findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          # Read the latest review comment from the PR
          COMMENT=$(gh pr view $PR_NUMBER --json comments --jq '
            [.comments[] | select(.body | contains("<!-- SUMMARY:"))] | last | .body
          ')
          if [ -z "$COMMENT" ] || [ "$COMMENT" = "null" ]; then
            echo "high_count=0" >> $GITHUB_OUTPUT
            echo "low_count=0" >> $GITHUB_OUTPUT
            echo "round=1" >> $GITHUB_OUTPUT
            echo "last_reviewed_sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            SUMMARY=$(echo "$COMMENT" | grep '<!-- SUMMARY:' | head -1)
            HIGH=$(echo "$SUMMARY" | grep -oE '[0-9]+ HIGH' | grep -oE '[0-9]+')
            LOW=$(echo "$SUMMARY" | grep -oE '[0-9]+ LOW' | grep -oE '[0-9]+')
            ROUND=$(echo "$COMMENT" | grep -oP '(?<=<!-- review-round: )[0-9]+' || echo "1")
            LAST_SHA=$(echo "$COMMENT" | grep -oP '(?<=<!-- last-reviewed-sha: )[a-f0-9]+' || echo "${{ github.event.workflow_run.head_sha }}")
            echo "high_count=${HIGH:-0}" >> $GITHUB_OUTPUT
            echo "low_count=${LOW:-0}" >> $GITHUB_OUTPUT
            echo "round=${ROUND:-1}" >> $GITHUB_OUTPUT
            echo "last_reviewed_sha=${LAST_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Auto-merge if clean
        if: |
          steps.pr.outputs.found_pr == 'true' &&
          steps.findings.outputs.high_count == '0' &&
          steps.findings.outputs.low_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          echo "PR #$PR_NUMBER is clean — auto-merging"
          gh pr merge $PR_NUMBER --squash --auto --repo ${{ github.repository }}

      - name: Block if max rounds exceeded
        if: |
          steps.pr.outputs.found_pr == 'true' &&
          (steps.findings.outputs.high_count != '0' || steps.findings.outputs.low_count != '0') &&
          steps.findings.outputs.round >= '3'
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          PROJECT_ID: ${{ secrets.SDLC_PROJECT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          ISSUE_NUMBER="${{ steps.pr.outputs.issue_number }}"
          # Post a Blocked comment
          gh pr comment $PR_NUMBER --body "## Blocked: Review Loop Exhausted (3 rounds)

          The build agent could not resolve all findings after 3 review rounds.
          Unresolved findings: ${{ steps.findings.outputs.high_count }} HIGH, ${{ steps.findings.outputs.low_count }} LOW.

          Please review the findings above and provide guidance. Move the card back to \`Executing\` after updating." --repo ${{ github.repository }}
          # Move the Projects card to "Blocked" lane
          if [ "$ISSUE_NUMBER" != "0" ] && [ -n "$PROJECT_ID" ]; then
            bash scripts/update-card-status.sh --issue "$ISSUE_NUMBER" --lane "Blocked" --repo ${{ github.repository }}
          else
            echo "WARNING: Could not move card to Blocked — issue_number=$ISSUE_NUMBER, PROJECT_ID set=${PROJECT_ID:+yes}"
          fi

      - name: Re-dispatch build agent to fix findings
        if: |
          steps.pr.outputs.found_pr == 'true' &&
          (steps.findings.outputs.high_count != '0' || steps.findings.outputs.low_count != '0') &&
          steps.findings.outputs.round < '3'
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          ROUND=$(( ${{ steps.findings.outputs.round }} + 1 ))
          echo "Re-dispatching build agent for round $ROUND"
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type=sdlc-phase \
            -f 'client_payload[agent]=build' \
            -f 'client_payload[model]=opencode-go/deepseek-v4-pro' \
            -f 'client_payload[phase]=review-fix' \
            -f 'client_payload[issue_number]=${{ steps.pr.outputs.issue_number }}' \
            -f "client_payload[pr_number]=$PR_NUMBER" \
            -f "client_payload[review_round]=$ROUND" \
            -f "client_payload[last_reviewed_sha]=${{ steps.findings.outputs.last_reviewed_sha }}"
