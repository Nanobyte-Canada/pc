name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID_DEV: portfolio-dev
  PROJECT_ID_PROD: portfolio-prod
  REGION: us-central1
  BACKEND_SERVICE_NAME: portfolio-backend
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev

jobs:
  # Run tests before deployment
  test:
    uses: ./.github/workflows/ci.yml

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            echo "PROJECT_ID=${{ env.PROJECT_ID_PROD }}" >> $GITHUB_ENV
            echo "APP_ENVIRONMENT=prod" >> $GITHUB_ENV
          else
            echo "PROJECT_ID=${{ env.PROJECT_ID_DEV }}" >> $GITHUB_ENV
            echo "APP_ENVIRONMENT=dev" >> $GITHUB_ENV
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/portfolio/${{ env.BACKEND_SERVICE_NAME }}:${{ github.sha }}
            ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/portfolio/${{ env.BACKEND_SERVICE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/portfolio/${{ env.BACKEND_SERVICE_NAME }}:${{ github.sha }}
          env_vars: |
            APP_VERSION=${{ github.sha }}
            APP_ENVIRONMENT=${{ env.APP_ENVIRONMENT }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [test, deploy-backend]
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            echo "PROJECT_ID=${{ env.PROJECT_ID_PROD }}" >> $GITHUB_ENV
            echo "API_URL=https://api.portfolio.example.com" >> $GITHUB_ENV
            echo "BUCKET_NAME=portfolio-frontend-prod" >> $GITHUB_ENV
          else
            echo "PROJECT_ID=${{ env.PROJECT_ID_DEV }}" >> $GITHUB_ENV
            echo "API_URL=https://api-dev.portfolio.example.com" >> $GITHUB_ENV
            echo "BUCKET_NAME=portfolio-frontend-dev" >> $GITHUB_ENV
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: ./frontend
        run: |
          npm ci
          VITE_API_URL=${{ env.API_URL }} npm run build

      - name: Upload to Cloud Storage
        run: |
          gcloud storage cp -r ./frontend/dist/* gs://${{ env.BUCKET_NAME }}/

      - name: Invalidate CDN cache (if using Cloud CDN)
        run: |
          gcloud compute url-maps invalidate-cdn-cache portfolio-lb \
            --path "/*" \
            --async || true
